apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - hpa.yaml
  - pdb.yaml
  - ingress.yaml
namespace: prod
commonLabels:
  env: prod
patches:
- target:
    kind: Deployment
    name: loadgenerator
  patch: |-
    $patch: delete
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: loadgenerator
