apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AmarGmail/sre-portfolio-boutique.git'
    targetRevision: HEAD
    path: apps/boutique/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
