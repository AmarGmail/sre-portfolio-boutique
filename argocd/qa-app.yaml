apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: boutique-qa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/AmarGmail/sre-portfolio-boutique.git'
    targetRevision: HEAD
    path: apps/boutique/overlays/qa
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
