name: DevSecOps CI Pipeline - Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/boutique/src/frontend/**'
      - 'apps/boutique/src/frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/boutique-frontend

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write # Required for security scanning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      # 1. BUILD THE IMAGE (But don't push it yet!)
      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: ./apps/boutique/src/frontend
          load: true # This keeps the image on the runner for scanning
          tags: ${{ steps.meta.outputs.tags }}

      # 2. THE SHIFT-LEFT SECURITY SCAN (Trivy)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}
          format: 'table'
          exit-code: '0' # This tells GitHub to FAIL THE PIPELINE if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL' # Only break the build for Critical CVEs

      # 3. PUSH THE IMAGE (Only happens if the scan passes!)
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/boutique/src/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 4. UPDATE GITOPS MANIFEST
      - name: Update Kustomize Image Tag
        run: |
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          cd apps/boutique/overlays/dev
          kustomize edit set image gcr.io/google-samples/microservices-demo/frontend=$NEW_IMAGE
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add kustomization.yaml
          git commit -m "chore: update frontend image to sha-${GITHUB_SHA::7} [skip ci]"
          git push
