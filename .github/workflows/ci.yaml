name: DevSecOps CI Pipeline - Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/boutique/src/frontend/**'
      - '.github/workflows/**' # FIX: Now editing the pipeline triggers the pipeline!

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/boutique-frontend

jobs:
  build-scan-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=sha,format=short

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: ./apps/boutique/src/frontend
          load: true
          tags: ${{ steps.meta.outputs.tags }}

      # FIX: Using native GitHub metadata for the image-ref
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '0' # AUDIT MODE: Will not break the build
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/boutique/src/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Kustomize Image Tag
        run: |
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          cd apps/boutique/overlays/dev
          kustomize edit set image gcr.io/google-samples/microservices-demo/frontend=$NEW_IMAGE
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add kustomization.yaml
          git commit -m "chore: update frontend image to ${{ steps.meta.outputs.version }} [skip ci]"
          git push
