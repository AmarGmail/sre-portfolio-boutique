name: CI/CD Pipeline - Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/boutique/src/frontend/**' # Only run if frontend code changes

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/boutique-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/boutique/src/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Kustomize Image Tag
        run: |
          # Get the new image tag generated by the build step
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          echo "Updating image to $NEW_IMAGE"
          
          # Navigate to the DEV overlay
          cd apps/boutique/overlays/dev
          
          # Use Kustomize to update the image reference
          kustomize edit set image gcr.io/google-samples/microservices-demo/frontend=$NEW_IMAGE
          
          # Commit the change back to the repository
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add kustomization.yaml
          git commit -m "chore: update frontend image to sha-${GITHUB_SHA::7} [skip ci]"
          git push
