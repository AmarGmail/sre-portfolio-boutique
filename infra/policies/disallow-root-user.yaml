apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-root-user
  annotations:
    policies.kyverno.io/title: Disallow Root User
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Running as root gives a container dangerous access to the host.
      This policy forces containers to run as a non-root user.
spec:
  validationFailureAction: Enforce  # Options: Enforce (Block) or Audit (Log only)
  background: true
  rules:
    - name: check-run-as-non-root
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Running as root is forbidden. You must set runAsNonRoot: true."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
